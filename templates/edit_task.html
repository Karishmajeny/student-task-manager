<!DOCTYPE html>
<html>

<head>

<title>Edit Task</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">


</head>


<body>


<div class="container">


<div class="welcome-banner mt-4">

<h2>✏️ Edit Task</h2>

<p>Update your task details</p>

</div>



<div class="card shadow p-4">


<form method="POST">


<div class="mb-3">

<label>Task Title</label>

<input 
type="text"
name="title"
class="form-control"
value="{{task.title}}"
required>

</div>



<div class="mb-3">

<label>Description</label>


<textarea
name="description"
class="form-control"
rows="4">{{task.description}}</textarea>


</div>



<div class="mb-3">

<label>Priority</label>


<select name="priority"
class="form-select">


<option {% if task.priority=="High" %}selected{% endif %}>
High
</option>


<option {% if task.priority=="Medium" %}selected{% endif %}>
Medium
</option>


<option {% if task.priority=="Low" %}selected{% endif %}>
Low
</option>


</select>


</div>




<div class="mb-3">

<label>Due Date</label>


<input
type="date"
name="due_date"
class="form-control"
value="{{task.due_date}}">


</div>




<div class="mb-3">

<label>Status</label>


<select name="status"
class="form-select">


<option {% if task.status=="Pending" %}selected{% endif %}>
Pending
</option>


<option {% if task.status=="Completed" %}selected{% endif %}>
Completed
</option>


</select>


</div>



<button class="btn btn-success">

Save Changes

</button>


<a href="/"
class="btn btn-secondary">

Cancel

</a>



</form>


</div>


</div>


</body>

</html>
