<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="welcome-banner mt-4">

        <h2>➕ Add New Task</h2>

        <p>Create your next task</p>

    </div>

    <div class="card shadow p-4">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Task Title

                </label>

                <input
                        type="text"
                        name="title"
                        class="form-control"
                        required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Description

                </label>

                <textarea
                        name="description"
                        class="form-control"
                        rows="4"
                        required></textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Priority

                </label>

                <select
                        name="priority"
                        class="form-select">

                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Due Date

                </label>

                <input
                        type="date"
                        name="due_date"
                        class="form-control">

            </div>

            <button
                    class="btn btn-success">

                Save Task

            </button>

            <a href="/"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

</body>

</html>
